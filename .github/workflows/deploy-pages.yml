name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - 'images/**'
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deploy directory
        run: |
          mkdir -p _deploy/_includes
          cp *.md _deploy/
          cp _config.yml _deploy/
          cp _includes/head-custom.html _deploy/_includes/
          cp -r images _deploy/
          cp -r icons _deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
